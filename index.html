<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rural Health Tracker | Full Dashboard View</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/Asha/assets/manifest-BAz28Vrz.json?v=2">
    <meta name="theme-color" content="#0F172A">
    <link rel="apple-touch-icon" href="/Asha/assets/icon-AtSMvo60.png">

    <style>
        :root {
            --primary: #0F172A;
            --secondary: #10B981;
            --accent: #F59E0B;
            --background: #F8FAFC;
            --surface: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --sidebar-width: 260px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #root { display: flex; width: 100%; }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar h1 { font-family: 'Outfit'; font-size: 20px; margin-bottom: 40px; }
        
        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 8px;
            font-weight: 600;
            transition: all 0.2s;
            color: rgba(255,255,255,0.6);
        }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-item.active { color: white; background: var(--secondary); }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            border-left: 4px solid var(--secondary);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
            margin-bottom: 20px;
        }

        .stat-card { border-left-color: var(--accent); }
        .stat-val { font-size: 32px; font-weight: 800; display: block; color: var(--primary); }
        .stat-lab { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }

        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th { text-align: left; padding: 14px; background: #F1F5F9; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; }
        .table td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-hr { background: #FEF3C7; color: #92400E; }
        .badge-ok { background: #DCFCE7; color: #166534; }

        .btn {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }

        .animate-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [screen, setScreen] = useState('dashboard');

            const Sidebar = () => (
                <div className="sidebar">
                    <h1>HealthTracker</h1>
                    <div className={`nav-item ${screen === 'dashboard' ? 'active' : ''}`} onClick={() => setScreen('dashboard')}>Dashboard</div>
                    <div className={`nav-item ${screen === 'goshwara' ? 'active' : ''}`} onClick={() => setScreen('goshwara')}>Goshwara Report</div>
                    <div className="nav-item">Village Register</div>
                    <div className="nav-item">Incentive Claims</div>
                    <div style={{marginTop: 'auto'}} className="nav-item">Settings</div>
                </div>
            );

            const Dashboard = () => (
                <div className="main-content animate-fade">
                    <div className="header-bar">
                        <div>
                            <h2 style={{margin: 0, fontSize: 28}}>Village Overview</h2>
                            <p style={{color: 'var(--text-secondary)', margin: '4px 0 0'}}>Dhanora SC • Sub-Centre Statistics</p>
                        </div>
                        <button className="btn">Export CSV</button>
                    </div>

                    <div className="stat-grid">
                        <div className="card stat-card">
                            <span className="stat-val">24</span>
                            <span className="stat-lab">Total ANC Registered</span>
                        </div>
                        <div className="card stat-card" style={{borderLeftColor: '#EF4444'}}>
                            <span className="stat-val">06</span>
                            <span className="stat-lab">High Risk Cases</span>
                        </div>
                        <div className="card stat-card" style={{borderLeftColor: '#3B82F6'}}>
                            <span className="stat-val">112</span>
                            <span className="stat-lab">Eligible Couples</span>
                        </div>
                        <div className="card stat-card" style={{borderLeftColor: '#10B981'}}>
                            <span className="stat-val">89%</span>
                            <span className="stat-lab">Vaccination Rate</span>
                        </div>
                    </div>

                    <div className="card" style={{borderLeft: 'none'}}>
                        <h3 style={{marginTop: 0, marginBottom: 20}}>Recent Clinical Entries</h3>
                        <table className="table">
                            <thead>
                                <tr>
                                    <th>Member Name</th>
                                    <th>Service Type</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong>Lata Patil</strong></td>
                                    <td>ANC Visit (3rd)</td>
                                    <td>02 May 2026</td>
                                    <td><span className="badge badge-hr">High Risk (Anemia)</span></td>
                                    <td><a href="#" style={{color: '#3B82F6', fontWeight: 600}}>View Card</a></td>
                                </tr>
                                <tr>
                                    <td><strong>Amit Shinde</strong></td>
                                    <td>MR Dose 1</td>
                                    <td>01 May 2026</td>
                                    <td><span className="badge badge-ok">Completed</span></td>
                                    <td><a href="#" style={{color: '#3B82F6', fontWeight: 600}}>View Card</a></td>
                                </tr>
                                <tr>
                                    <td><strong>Radha More</strong></td>
                                    <td>PNC Visit (Day 3)</td>
                                    <td>30 Apr 2026</td>
                                    <td><span className="badge badge-ok">Normal</span></td>
                                    <td><a href="#" style={{color: '#3B82F6', fontWeight: 600}}>View Card</a></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            const Goshwara = () => (
                <div className="main-content animate-fade">
                    <div className="header-bar">
                        <div>
                            <h2 style={{margin: 0, fontSize: 28}}>Goshwara Monthly Abstract</h2>
                            <p style={{color: 'var(--text-secondary)', margin: '4px 0 0'}}>May 2026 • Official Reporting Format</p>
                        </div>
                        <div style={{display: 'flex', gap: 10}}>
                            <button className="btn" style={{background: '#EF4444'}} onClick={() => alert('Report Unlocked')}>Edit Data</button>
                            <button className="btn btn-sec" onClick={() => alert('Submitting to PHC...')}>Finalize & Submit</button>
                        </div>
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: 20}}>
                        <div className="card" style={{borderLeftColor: '#3B82F6'}}>
                            <h3 style={{marginTop: 0}}>1. Maternal Health Abstract</h3>
                            <table className="table">
                                <thead>
                                    <tr><th>Parameter</th><th>M-1 (Current)</th><th>M-2 (Previous)</th></tr>
                                </thead>
                                <tbody>
                                    <tr><td>Total New ANC Registrations</td><td>08</td><td>06</td></tr>
                                    <tr><td>ANC Registration within 12 Weeks</td><td>05</td><td>04</td></tr>
                                    <tr><td>High Risk Cases Identified</td><td>03</td><td>01</td></tr>
                                    <tr><td>Institutional Deliveries (Public)</td><td>04</td><td>03</td></tr>
                                    <tr><td>Maternal Deaths Reported</td><td>00</td><td>00</td></tr>
                                </tbody>
                            </table>
                        </div>

                        <div className="card" style={{borderLeftColor: '#10B981'}}>
                            <h3 style={{marginTop: 0}}>2. Immunization & Vital</h3>
                            <table className="table">
                                <thead>
                                    <tr><th>Vaccine</th><th>Target</th><th>Achieved</th></tr>
                                </thead>
                                <tbody>
                                    <tr><td>BCG</td><td>10</td><td>10</td></tr>
                                    <tr><td>Pentavalent 3</td><td>12</td><td>11</td></tr>
                                    <tr><td>MR Dose 1</td><td>10</td><td>09</td></tr>
                                    <tr><td>Child Deaths</td><td>05</td><td>00</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            return (
                <div id="root">
                    <Sidebar />
                    {screen === 'dashboard' ? <Dashboard /> : <Goshwara />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        // REGISTER THE SERVICE WORKER FOR OFFLINE & SYNC SUPPORT
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('✅ Service Worker Registered:', reg.scope);
                        
                        // Background Sync Registration Example
                        if ('sync' in reg) {
                            console.log('🔄 Background Sync Supported');
                        }
                    })
                    .catch(err => console.log('❌ Service Worker Error:', err));
            });
        }
    </script>
</body>
</html>
